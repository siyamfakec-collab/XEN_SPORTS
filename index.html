<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>XEN SPORTS</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="XEN SPORTS">
    <meta name="theme-color" content="#050d18">
    <link rel="apple-touch-icon" href="https://i.ibb.co.com/rGHtys1G/file-000000009fb87208b7d1ca320d4b478c.png">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050d18;
            --surface: #0b1828;
            --surface2: #0f2035;
            --accent: #00e5ff;
            --red: #ff2d2d;
            --gold: #ffc93c;
            --green: #00e676;
            --text: #f0f4f8;
            --muted: #6b7c93;
            --border: rgba(255,255,255,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .topbar .logo { width: 36px; height: 36px; object-fit: contain; }
        .topbar-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.25rem; font-weight: 900;
            letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(90deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .live-pill {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,45,45,0.15); border: 1px solid rgba(255,45,45,0.4);
            padding: 4px 10px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700; color: var(--red); letter-spacing: 1.5px;
        }
        .live-dot {
            width: 6px; height: 6px; background: var(--red);
            border-radius: 50%; animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        /* NOTIFICATION BELL */
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .notif-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--muted); border-radius: 8px; padding: 7px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .notif-btn.active {
            background: rgba(0,229,255,0.15); border-color: var(--accent); color: var(--accent);
        }
        .notif-btn:active { transform: scale(0.92); }

        /* TAB NAV */
        .tab-nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 11px 6px; background: transparent; border: none;
            color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; cursor: pointer; position: relative; transition: color 0.2s;
        }
        .tab-btn.active { color: var(--accent); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 10%; width: 80%; height: 2px;
            background: var(--accent); border-radius: 2px 2px 0 0;
        }

        /* PAGES */
        .page { display: none; }
        .page.active { display: block; }

        /* PLAYER */
        .player-section { position: relative; background: #000; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        .video-container iframe {
            position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none;
        }
        .video-container iframe.active { display: block; }

        /* STREAM CONTROLS OVERLAY */
        .stream-controls {
            position: absolute; inset: 0; z-index: 5; pointer-events: none;
        }
        .stream-controls-inner {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 10px 12px; display: flex; align-items: center; gap: 8px; justify-content: flex-end;
            background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.25s ease; pointer-events: all;
        }
        .stream-controls-inner.show { opacity: 1; }
        .ctrl-btn {
            background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            border-radius: 8px; padding: 7px 10px; cursor: pointer;
            font-size: 0.75rem; font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 5px;
            backdrop-filter: blur(4px); transition: background 0.2s;
        }
        .ctrl-btn:active { background: rgba(0,200,255,0.3); border-color: var(--accent); }

        /* CHANNEL BAR */
        .channel-bar {
            display: flex; gap: 8px; padding: 12px 12px 8px;
            background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .ch-btn {
            flex: 1; background: var(--surface2); border: 1px solid var(--border);
            color: var(--muted); padding: 9px 6px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem;
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .ch-btn.active {
            background: var(--red); color: #fff; border-color: var(--red);
            box-shadow: 0 0 16px rgba(255,45,45,0.35);
        }

        /* NOW PLAYING */
        .now-playing {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
        }
        .now-playing-label {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem;
            font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
        }
        .now-playing-name {
            font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem;
            font-weight: 900; letter-spacing: 1px; color: var(--text);
        }

        /* SCHEDULE HEADER */
        .section-header { display: flex; align-items: center; gap: 8px; padding: 16px 14px 10px; }
        .section-header-line { width: 3px; height: 18px; background: var(--accent); border-radius: 2px; }
        .section-header h2 {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem;
            font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted);
        }

        /* DATE FILTER */
        .date-filter {
            display: flex; gap: 8px; overflow-x: auto; padding: 0 14px 12px; scrollbar-width: none;
        }
        .date-filter::-webkit-scrollbar { display: none; }
        .date-chip {
            flex: 0 0 auto; padding: 6px 14px; border-radius: 20px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem;
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .date-chip.active { background: rgba(0,229,255,0.15); border-color: var(--accent); color: var(--accent); }

        /* MATCH CARDS */
        .matches-list { padding: 0 10px 20px; display: flex; flex-direction: column; gap: 8px; }
        .match-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 14px;
            display: flex; align-items: center; gap: 10px;
            transition: border-color 0.2s; position: relative; overflow: hidden;
        }
        .match-card.live-match {
            border-color: rgba(255,45,45,0.45);
            background: linear-gradient(135deg, var(--surface) 0%, rgba(255,45,45,0.06) 100%);
        }
        .match-card.upcoming-match { border-color: rgba(0,229,255,0.12); }
        .match-card.finished-match { opacity: 0.7; }

        /* LIVE badge on card */
        .match-live-badge {
            position: absolute; top: 7px; right: 9px;
            display: flex; align-items: center; gap: 4px;
            background: var(--red); padding: 2px 7px; border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.62rem;
            font-weight: 700; letter-spacing: 1.5px; color: #fff;
        }
        .match-live-dot {
            width: 5px; height: 5px; background: #fff;
            border-radius: 50%; animation: pulse 1.2s ease-in-out infinite;
        }
        /* UPCOMING badge */
        .match-upcoming-badge {
            position: absolute; top: 7px; right: 9px;
            background: rgba(0,229,255,0.12); border: 1px solid rgba(0,229,255,0.3);
            padding: 2px 8px; border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.58rem;
            font-weight: 700; letter-spacing: 1px; color: var(--accent);
        }

        .match-time-col {
            display: flex; flex-direction: column; align-items: center; min-width: 58px;
        }
        .match-time-val {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem;
            font-weight: 700; color: var(--gold); line-height: 1.2; white-space: nowrap;
        }
        .match-time-tz { font-size: 0.58rem; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
        .match-score-val {
            font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem;
            font-weight: 900; color: var(--text); letter-spacing: 1px; line-height: 1;
        }

        .match-divider { width: 1px; height: 36px; background: var(--border); flex-shrink: 0; }

        /* MATCH TEAMS + SCORE */
        .match-body { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 0; }
        .team img { width: 30px; height: 21px; object-fit: cover; border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .team-name {
            font-size: 0.65rem; font-weight: 600; color: var(--text);
            text-align: center; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 65px;
        }

        .vs-badge {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.68rem;
            font-weight: 700; color: var(--muted); letter-spacing: 1px;
        }

        /* DATE LABEL */
        .match-date-label {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem;
            font-weight: 700; letter-spacing: 2px; color: var(--muted);
            text-transform: uppercase; padding: 12px 14px 4px;
        }

        /* TODAY SECTION TITLE */
        .today-section-title {
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.75rem;
            font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--accent); padding: 10px 14px 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .today-section-title::before {
            content: ''; width: 3px; height: 14px;
            background: var(--accent); border-radius: 2px; display: inline-block;
        }

        /* FULLSCREEN OVERLAY */
        .fs-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; }
        .fs-overlay.open { display: block; }
        .fs-overlay iframe { width: 100%; height: 100%; border: none; }
        .fs-close {
            position: absolute; top: env(safe-area-inset-top, 12px); right: 14px;
            background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 14px; border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem;
            font-weight: 700; cursor: pointer; z-index: 10; letter-spacing: 1px;
        }

        /* Fallback: rotate the overlay itself into landscape when the
           Screen Orientation Lock API isn't available (e.g. iOS Safari) */
        @media (orientation: portrait) {
            .fs-overlay.force-landscape {
                width: 100vh; height: 100vw;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%) rotate(90deg);
            }
        }

        @media (orientation: landscape) {
            .video-container { padding-bottom: 0; height: calc(100vw * 0.5625); max-height: 75vh; }
        }

        footer {
            text-align: center; padding: 14px 16px 10px;
            color: var(--muted); font-size: 0.68rem;
            border-top: 1px solid var(--border); letter-spacing: 0.5px;
        }
        footer .dev-credit {
            margin-top: 4px; font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
            color: rgba(0,229,255,0.5); text-transform: uppercase;
        }
    </style>
</head>

// ── HELPERS ──
function parseMatchDate(dateStr, timeStr) {
    const monthMap = { JUNE: 5 };
    const parts = dateStr.split(' ');
    const month = monthMap[parts[0]];
    const day = parseInt(parts[1]);
    const [timePart, ampm] = timeStr.split(' ');
    let [hours, minutes] = timePart.split(':').map(Number);
    if (ampm === 'PM' && hours !== 12) hours += 12;
    if (ampm === 'AM' && hours === 12) hours = 0;
    const utcMs = Date.UTC(2026, month, day, hours, minutes) - (5 * 60 + 30) * 60 * 1000;
    return new Date(utcMs);
}

function getMatchStatus(m) {
    const start = parseMatchDate(m.date, m.time);
    const end = new Date(start.getTime() + 115 * 60 * 1000);
    const now = new Date();
    if (now >= start && now <= end) return 'live';
    if (now < start) return 'upcoming';
    return 'finished';
}

function getTodayDateStr() {
    // Bangladesh Standard Time = UTC+6
    const bd = new Date(Date.now() + 6 * 3600000);
    const months = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
    return months[bd.getUTCMonth()] + ' ' + bd.getUTCDate();
}

// ── IST -> BD TIME (BD = IST + 30 min) ──
// All match times in the data above are stored as IST clock times.
// This converts them to Bangladesh time for display purposes only.
function toBDTime(timeStr) {
    const [timePart, ampm] = timeStr.split(' ');
    let [h, m] = timePart.split(':').map(Number);
    let total = (h % 12) * 60 + m + (ampm === 'PM' ? 12 * 60 : 0); // minutes since 12:00 AM
    total = (total + 30) % 1440; // BD = IST + 30 minutes
    let hh = Math.floor(total / 60);
    const mm = total % 60;
    const newAmpm = hh < 12 ? 'AM' : 'PM';
    let displayH = hh % 12;
    if (displayH === 0) displayH = 12;
    return `${String(displayH).padStart(2, '0')}:${String(mm).padStart(2, '0')} ${newAmpm}`;
}

// ── AUTO LIVE SCORE UPDATE (TheSportsDB — free, no signup needed) ──
const TSDB_KEY = '3';            // public free test key
const TSDB_LEAGUE_ID = 4429;     // FIFA World Cup

// Some team names in our data differ from TheSportsDB's naming
const teamAliasMap = {
    'Korea Republic': 'South Korea',
    'Czechia': 'Czech Republic',
    'USA': 'United States',
    'Cabo Verde': 'Cape Verde',
    'Bosnia & Herz.': 'Bosnia and Herzegovina',
    'Turkiye': 'Turkey',
    'Congo': 'DR Congo',
    'Curacao': 'Curaçao',
};

function normTeam(name) {
    const mapped = teamAliasMap[name] || name;
    return mapped.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z]/g, '');
}

function sameTeam(a, b) {
    if (!a || !b) return false;
    const na = normTeam(a), nb = normTeam(b);
    return na === nb || na.includes(nb) || nb.includes(na);
}

// The date a match falls on in UTC (TheSportsDB stores events by UTC date)
function utcDateStrFor(m) {
    const d = parseMatchDate(m.date, m.time);
    return d.toISOString().slice(0, 10); // YYYY-MM-DD
}

// Fetch & merge real scores for matches that are live or finished-but-unscored.
async function updateLiveScores() {
    const needed = matches.filter(m => {
        const st = getMatchStatus(m);
        return st === 'live' || (st === 'finished' && !m.score);
    });
    if (needed.length === 0) return;

    const dates = [...new Set(needed.map(utcDateStrFor))];
    let changed = false;

    for (const d of dates) {
        try {
            const res = await fetch(`https://www.thesportsdb.com/api/v1/json/${TSDB_KEY}/eventsday.php?d=${d}&l=${TSDB_LEAGUE_ID}`);
            const data = await res.json();
            const events = (data && data.events) ? data.events : [];
            needed.filter(m => utcDateStrFor(m) === d).forEach(m => {
                const ev = events.find(e =>
                    (sameTeam(e.strHomeTeam, m.t1) && sameTeam(e.strAwayTeam, m.t2)) ||
                    (sameTeam(e.strHomeTeam, m.t2) && sameTeam(e.strAwayTeam, m.t1))
                );
                if (ev && ev.intHomeScore !== null && ev.intAwayScore !== null && ev.intHomeScore !== '' && ev.intAwayScore !== '') {
                    const hs = parseInt(ev.intHomeScore, 10);
                    const as = parseInt(ev.intAwayScore, 10);
                    const newScore = sameTeam(ev.strHomeTeam, m.t1) ? [hs, as] : [as, hs];
                    if (!m.score || m.score[0] !== newScore[0] || m.score[1] !== newScore[1]) {
                        m.score = newScore;
                        changed = true;
                    }
                }
            });
        } catch (e) {
            // network/CORS hiccup — keep last known data, try again next cycle
        }
    }

    if (changed) {
        renderMatches();
        renderTodayUpcoming();
    }
}

// ── FULLSCREEN & ROTATE ──
function enterFullscreen(el) {
    if (el.requestFullscreen) return el.requestFullscreen();
    if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
    if (el.webkitEnterFullscreen) return el.webkitEnterFullscreen(); // iOS video fallback
    return Promise.reject(new Error('Fullscreen not supported'));
}

function rotateFullscreen(e) {
    if (e) e.stopPropagation();
    const src = document.getElementById('ch' + currentCh).src || chSrcs[currentCh];
    const overlay = document.getElementById('fsOverlay');
    document.getElementById('fsFrame').src = src;
    overlay.classList.add('open');
    requestWakeLock();

    const goLandscape = () => {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => overlay.classList.add('force-landscape'));
        } else {
            // Orientation Lock API not available (e.g. iOS Safari) — rotate via CSS instead
            overlay.classList.add('force-landscape');
        }
    };

    // Fullscreen must be entered first — most browsers reject orientation
    // lock requests made outside of an active fullscreen context.
    Promise.resolve(enterFullscreen(overlay)).then(goLandscape).catch(goLandscape);
}

function openFullscreen(e) {
    if (e) e.stopPropagation();
    const src = document.getElementById('ch' + currentCh).src || chSrcs[currentCh];
    const overlay = document.getElementById('fsOverlay');
    document.getElementById('fsFrame').src = src;
    overlay.classList.add('open');
    Promise.resolve(enterFullscreen(overlay)).catch(() => {});
    requestWakeLock();
}

function closeFullscreen() {
    const overlay = document.getElementById('fsOverlay');
    overlay.classList.remove('open');
    overlay.classList.remove('force-landscape');
    document.getElementById('fsFrame').src = '';
    if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}

document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
        const overlay = document.getElementById('fsOverlay');
        overlay.classList.remove('open');
        overlay.classList.remove('force-landscape');
        document.getElementById('fsFrame').src = '';
        if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
    }
});
document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement) {
        const overlay = document.getElementById('fsOverlay');
        overlay.classList.remove('open');
        overlay.classList.remove('force-landscape');
        document.getElementById('fsFrame').src = '';
    }
});

// ── MATCH CARD HTML ──
function matchCardHTML(m) {
    const status = getMatchStatus(m);
    let badge = '';
    let cardClass = '';
    let centerBlock = '';

    if (status === 'live') {
        badge = `<div class="match-live-badge"><span class="match-live-dot"></span>LIVE</div>`;
        cardClass = 'live-match';
        if (m.score) {
            centerBlock = `
                <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
                    <span class="match-score-val">${m.score[0]} - ${m.score[1]}</span>
                    <span class="vs-badge" style="font-size:0.6rem; color:var(--red);">LIVE</span>
                </div>`;
        } else {
            centerBlock = `<span class="vs-badge">VS</span>`;
        }
    } else if (status === 'upcoming') {
        badge = `<div class="match-upcoming-badge">UPCOMING</div>`;
        cardClass = 'upcoming-match';
        centerBlock = `<span class="vs-badge">VS</span>`;
    } else {
        // finished
        cardClass = 'finished-match';
        if (m.score) {
            centerBlock = `
                <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
                    <span class="match-score-val">${m.score[0]} - ${m.score[1]}</span>
                    <span class="vs-badge" style="font-size:0.6rem;">FT</span>
                </div>`;
        } else {
            centerBlock = `<span class="vs-badge">FT</span>`;
        }
    }

    return `
        <div class="match-card ${cardClass}">
            ${badge}
            <div class="match-time-col">
                <span class="match-time-val">${toBDTime(m.time)}</span>
                <span class="match-time-tz">BD TIME</span>
            </div>
            <div class="match-divider"></div>
            <div class="match-body">
                <div class="team">
                    <img src="https://flagcdn.com/w80/${m.f1}.png" alt="${m.t1}" loading="lazy">
                    <span class="team-name">${m.t1}</span>
                </div>
                ${centerBlock}
                <div class="team">
                    <img src="https://flagcdn.com/w80/${m.f2}.png" alt="${m.t2}" loading="lazy">
                    <span class="team-name">${m.t2}</span>
                </div>
            </div>
        </div>
    `;
}

// ── DATE FILTER ──
const dates = [...new Set(matches.map(m => m.date))];
let activeDate = 'ALL';

function buildDateFilter() {
    const el = document.getElementById('dateFilter');
    const todayStr = getTodayDateStr();
    const allChip = `<div class="date-chip" onclick="filterDate('ALL',this)">All Dates</div>`;
    const chips = dates.map(d => {
        const short = d.replace('JUNE ', 'Jun ');
        const isToday = d === todayStr;
        return `<div class="date-chip${isToday?' active':''}" onclick="filterDate('${d}',this)">${short}${isToday?' TODAY':''}</div>`;
    }).join('');
    el.innerHTML = allChip + chips;
    activeDate = dates.find(d => d === todayStr) || 'ALL';
    if (activeDate === 'ALL') el.querySelector('.date-chip').classList.add('active');
}

function filterDate(date, el) {
    activeDate = date;
    document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderMatches();
}

function renderMatches() {
    const list = document.getElementById('matchList');
    const filtered = activeDate === 'ALL' ? matches : matches.filter(m => m.date === activeDate);
    if (activeDate === 'ALL') {
        const grouped = {};
        filtered.forEach(m => { if (!grouped[m.date]) grouped[m.date] = []; grouped[m.date].push(m); });
        list.innerHTML = Object.entries(grouped).map(([date, ms]) =>
            `<div class="match-date-label">${date}</div>` + ms.map(matchCardHTML).join('')
        ).join('');
    } else {
        list.innerHTML = filtered.map(matchCardHTML).join('');
    }
}

// ── TODAY (Live tab) ──
function renderTodayUpcoming() {
    const todayStr = getTodayDateStr();
    const todayMatches = matches.filter(m => m.date === todayStr);
    // Show live first, then upcoming — skip finished
    const live = todayMatches.filter(m => getMatchStatus(m) === 'live');
    const upcoming = todayMatches.filter(m => getMatchStatus(m) === 'upcoming');
    const showList = [...live, ...upcoming];

    const section = document.getElementById('todayUpcomingSection');
    const list = document.getElementById('todayMatchList');
    if (showList.length === 0) {
        section.style.display = 'none';
    } else {
        section.style.display = 'block';
        list.innerHTML = showList.map(matchCardHTML).join('');
    }
}

// ── NOTIFICATIONS ──
let notifEnabled = false;
let scheduledNotifs = [];

function toggleNotifBtn() {
    const btn = document.getElementById('notifBtn');
    if (notifEnabled) {
        disableNotifications(btn);
    } else {
        enableNotifications(btn);
    }
}

async function enableNotifications(btn) {
    if (!('Notification' in window)) {
        showToast('Eyi browser e push notification support nai.');
        return;
    }
    let perm = Notification.permission;
    if (perm === 'default') perm = await Notification.requestPermission();
    if (perm !== 'granted') {
        showToast('Notification permission deyni — settings theke allow korte hobe.');
        return;
    }
    notifEnabled = true;
    try { localStorage.setItem('xenNotif', '1'); } catch(e) {}
    btn.classList.add('active');
    scheduleMatchNotifications();
    showToast('Notifications ON — match shuru hobar 5 min age alert paben.');
}

function disableNotifications(btn) {
    notifEnabled = false;
    try { localStorage.setItem('xenNotif', '0'); } catch(e) {}
    btn.classList.remove('active');
    scheduledNotifs.forEach(id => clearTimeout(id));
    scheduledNotifs = [];
    showToast('Notifications off kora hoyeche.');
}

function scheduleMatchNotifications() {
    scheduledNotifs.forEach(id => clearTimeout(id));
    scheduledNotifs = [];
    const now = new Date();
    matches.forEach(m => {
        const start = parseMatchDate(m.date, m.time);
        const delay = start - 5 * 60000 - now;
        if (delay > 0) {
            const tid = setTimeout(() => {
                if (notifEnabled && Notification.permission === 'granted') {
                    new Notification('XEN SPORTS — Match Starting Soon!', {
                        body: `${m.t1} vs ${m.t2} — ${toBDTime(m.time)} BD`,
                        icon: 'https://i.ibb.co.com/rGHtys1G/file-000000009fb87208b7d1ca320d4b478c.png',
                        tag: `xen-${m.date}-${m.t1}`,
                        vibrate: [200, 100, 200],
                    });
                }
            }, delay);
            scheduledNotifs.push(tid);
        }
    });
}

function showToast(msg) {
    let t = document.getElementById('xen-toast');
    if (!t) {
        t = document.createElement('div');
        t.id = 'xen-toast';
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0f2035;border:1px solid rgba(0,229,255,0.3);color:#fff;padding:10px 18px;border-radius:10px;font-size:0.78rem;font-family:Inter,sans-serif;z-index:9998;text-align:center;max-width:85vw;box-shadow:0 4px 20px rgba(0,0,0,0.5);opacity:0;transition:opacity 0.3s;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// ── WAKE LOCK ──
let wakeLock = null;
async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
}
document.addEventListener('click', requestWakeLock, { once: true });
document.addEventListener('visibilitychange', () => {
    if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock();
});

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── INSTALL BANNER ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
});
function installApp() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBanner').style.display = 'none'; });
}
function dismissBanner() { document.getElementById('installBanner').style.display = 'none'; }

// ── INIT ──
buildDateFilter();
renderMatches();
renderTodayUpcoming();
updateLiveScores();

// Restore notification preference
(function initNotif() {
    try {
        const saved = localStorage.getItem('xenNotif');
        if (saved === '1' && 'Notification' in window && Notification.permission === 'granted') {
            notifEnabled = true;
            document.getElementById('notifBtn').classList.add('active');
            scheduleMatchNotifications();
        }
    } catch(e) {}
})();

// Auto-refresh every 60s
setInterval(() => {
    renderMatches();
    renderTodayUpcoming();
    updateLiveScores();
    if (notifEnabled) scheduleMatchNotifications();
}, 60000);
</script>
</body>
